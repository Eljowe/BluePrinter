<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">

  <defs>
    <linearGradient id="pedalBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FA3FF"></stop>
      <stop offset="100%" stop-color="#1F6ED4"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"></feDropShadow>
    </filter>
  </defs>

  <!-- Body -->
  <rect x="24" y="14" width="80" height="100" rx="14" fill="url(#pedalBody)" stroke="#174C9C" stroke-width="3" filter="url(#shadow)"></rect>

  <!-- Top Jacks -->
  <circle cx="42" cy="14" r="4" fill="#666"></circle>
  <circle cx="86" cy="14" r="4" fill="#666"></circle>

  <!-- Knobs -->
  <circle cx="46" cy="38" r="9" fill="#ECECEC" stroke="#666" stroke-width="2"></circle>
  <circle cx="82" cy="38" r="9" fill="#ECECEC" stroke="#666" stroke-width="2"></circle>

  <!-- Knob indicators -->
  <line x1="46" y1="38" x2="46" y2="31" stroke="#444" stroke-width="2" stroke-linecap="round"></line>
  <line x1="82" y1="38" x2="88" y2="35" stroke="#444" stroke-width="2" stroke-linecap="round"></line>

  <!-- LED -->
  <circle cx="64" cy="58" r="4.5" fill="#FF3B30"></circle>
  <circle cx="64" cy="58" r="2" fill="#FFD7D2"></circle>

  <!-- Footswitch -->
  <circle cx="64" cy="88" r="12" fill="#D8D8D8" stroke="#7A7A7A" stroke-width="3"></circle>
  <circle cx="64" cy="88" r="5" fill="#AFAFAF"></circle>

  <!-- Label -->
  <rect x="40" y="103" width="48" height="5" rx="2.5" fill="#E8F2FF" opacity="0.9"></rect>
</svg>